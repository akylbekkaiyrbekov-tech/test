<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Find it!</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="game-container">
        <h1 id="question-text">Where is Tree?</h1>
        
        <div class="options">
            <div class="card" onclick="checkAnswer('left')">
                <img id="img-left" src="images/tree-false.jpg" alt="Option 1">
                <div class="status-icon" id="status-left"></div>
            </div>

            <div class="card" onclick="checkAnswer('right')">
                <img id="img-right" src="images/tree-true.jpg" alt="Option 2">
                <div class="status-icon" id="status-right"></div>
            </div>
        </div>
    </div>

    <div id="slideshow-container" class="hidden">
        <img id="slideshow-img" src="" alt="Slide">
    </div>

    <script src="script.js"></script>
</body>
</html>
